    { t: "Bài 15: Sử học", q: "Bộ quốc sử chính thức đầu tiên của Đại Việt do ai soạn thảo?", a: "Lê Văn Hưu", opts: ["Lê Văn Hưu", "Ngô Sĩ Liên", "Phan Huy Chú", "Lê Quý Đôn"] },
    { t: "Bài 15: Tín ngưỡng", q: "Tín ngưỡng bản địa nào vẫn được duy trì mạnh mẽ trong văn minh Đại Việt?", a: "Thờ cúng tổ tiên", opts: ["Thờ cúng tổ tiên", "Thờ thần mặt trời", "Thờ thần Shiva", "Thờ thần lửa"] },
    { t: "Bài 15: Đặc điểm", q: "Giá trị cốt lõi nhất của văn minh Đại Việt là?", a: "Lòng yêu nước và tinh thần độc lập tự chủ", opts: ["Lòng yêu nước và tinh thần độc lập tự chủ", "Sự hòa đồng tôn giáo", "Phát triển thương mại", "Du nhập văn hóa phương Tây"] }
];

let correctCount = 0; let wrongCount = 0;

// Hàm trộn mảng
function shuffle(array) { 
    return array.sort(() => Math.random() - 0.5); 
}

function initQuiz() {
    const box = document.getElementById('quiz-box');
    box.innerHTML = ''; 
    correctCount = 0; 
    wrongCount = 0;
    document.getElementById('correct-count').innerText = 0;
    document.getElementById('wrong-count').innerText = 0;
    
    // Sửa lỗi: Gọi đúng biến 'data' thay vì 'questions'
    const shuffledQ = shuffle([...data]);
    
    shuffledQ.forEach((item, index) => {
        const card = document.createElement('div');
        card.className = 'question-card';
        const opts = shuffle([...item.opts]);
        card.innerHTML = `
            <span class="tag">${item.t}</span>
            <div class="q-text">Câu ${index + 1}: ${item.q}</div>
            <div class="options">
                ${opts.map(o => `<div class="opt" onclick="check(this, '${o.replace(/'/g, "\\'")}', '${item.a.replace(/'/g, "\\")}')">${o}</div>`).join('')}
            </div>
        `;
        box.appendChild(card);
    });
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

function check(el, selected, correct) {
    const parent = el.parentElement;
    const options = parent.querySelectorAll('.opt');
    
    if (selected === correct) {
        el.classList.add('correct'); 
        correctCount++;
    } else {
        el.classList.add('wrong'); 
        wrongCount++;
        // Hiện đáp án đúng nếu chọn sai
        options.forEach(opt => { 
            if (opt.innerText === correct) opt.classList.add('correct'); 
        });
    }
    
    // Vô hiệu hóa các lựa chọn sau khi đã chọn
    options.forEach(opt => opt.classList.add('disabled'));
    
    document.getElementById('correct-count').innerText = correctCount;
    document.getElementById('wrong-count').innerText = wrongCount;
}

// Chạy lần đầu
initQuiz();
</script>
