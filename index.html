  tinhHuong: [
    {
      id: 44,
      title: "Cơ sở Y kinh doanh rượu không nguồn gốc",
      content: "Qua kiểm tra tình hình an ninh, trật tự trên địa bàn thuộc thẩm quyền quản lý, Công an tỉnh H phát hiện cơ sở Y sản xuất, kinh doanh rượu không có giấy tờ, nguồn gốc xuất xứ. Tại thời điểm kiểm tra, trong kho hàng của cơ sở có một số thùng phuy nhựa chứa 1000 lít rượu không có tem nhãn hàng hóa theo quy định và 75 kg men không rõ nguồn gốc xuất xứ, chủ cơ sở không xuất trình được hồ sơ pháp lý liên quan đến hoạt động kinh doanh của mình. Công an tỉnh H đã lập biên bản và xử phạt hành chính đối với hành vi kinh doanh hàng hóa không rõ nguồn gốc xuất xứ của cơ sở Y theo quy định của pháp luật. Sau khi nhận quyết định xử phạt, thấy có một số nội dung ghi trong quyết định xử phạt mà mình không vi phạm, chủ cơ sở đã làm đơn khiếu nại gửi tới cơ quan chức năng để nghị xem xét lại và được cơ quan có thẩm quyền điều chỉnh một số nội dung trong quyết định xử phạt.",

        { question: "Câu 2: Đặc điểm về tính quy phạm phổ biến của pháp luật được thể hiện như thế nào trong thông tin trên?", options: ["A. Gửi đơn khiếu nại tới cơ quan chức năng.", "B. Mọi công dân phải tuân thủ pháp luật về kinh doanh.", "C. Xử phạt hành vi vi phạm pháp luật về kinh doanh.", "D. Hoạt động kiểm tra giám sát các cơ sở kinh doanh."], answer: "B" },

        { question: "Câu 4: Việc xử phạt của công an tỉnh H đối với cơ sở Y thể hiện đặc điểm nào dưới đây của pháp luật?", options: ["A. Tính quy phạm phổ biến.", "B. Tính xác định về hình thức.", "C. Tính quyền lực bắt buộc chung.", "D. Tính lợi nhuận trong kinh doanh."], answer: "C" }
      ]

    {
      id: 45,
      title: "Anh T vượt đèn đỏ",
      content: "Anh T đi xe máy vượt đèn đỏ nên bị cảnh sát giao thông lập biên bản xử phạt. Anh T trình bày vì gia đình có việc nên anh đi vội, không chú ý tín hiệu đèn giao thông. Anh mong muốn cảnh sát giao thông bỏ qua cho lỗi của mình. Người cảnh sát giải thích: \"Để bảo đảm trật tự, an toàn cho mọi người khi tham gia giao thông và giao thông được thông suốt, Nhà nước đã ban hành pháp luật quy định người tham gia giao thông phải chấp hành tín hiệu đèn giao thông, dừng xe trước vạch kẻ đường khi gặp đèn đỏ. Đây là quy tắc xử sự chung bắt buộc tất cả mọi người khi tham gia giao thông phải tuân thủ và thực hiện nghiêm túc ở mọi nơi, vào bất kì thời gian nào. Nếu không tuân thủ quy định này sẽ bị xử phạt\".",
      questions: [
        { question: "Câu 1: Việc cảnh sát giao thông lập biên bản xử phạt anh T là thể hiện tính", options: ["A. nhân văn, nhân ái.", "B. quyền lực nhà nước.", "C. quy phạm phổ biến.", "D. lợi ích cá nhân."], answer: "B" },
        { question: "Câu 2: Vai trò quản lý xã hội của pháp luật được thể hiện như thế nào trong thông tin trên?", options: ["A. Bảo vệ quyền lợi của công dân.", "B. Điều chỉnh hành vi của công dân.", "C. Xác nhận tư cách quyền công dân.", "D. Xâm phạm lợi ích của công dân."], answer: "B" },
        { question: "Câu 3: Việc cảnh sát giao thông tiến hành lập biên bản xử phạt những người có hành vi vi phạm các quy định của Luật giao thông đường bộ phản ánh vai trò nào dưới đây của pháp luật?", options: ["A. Bảo vệ quyền lợi của công dân.", "B. Xác nhận các quyền công dân.", "C. Quản lý xã hội.", "D. Tính quyền lực chung."], answer: "C" },
        { question: "Câu 4: Theo quy định của pháp luật, mọi công dân có trách nhiệm chấp hành tín hiệu điều khiển giao thông để đảm bảo an toàn khi tham gia giao thông là thể hiện đặc điểm nào dưới đây của pháp luật", options: ["A. Tính quy phạm phổ biến.", "B. Tính quyền lực bắt buộc chung.", "C. Tính xác định chặt chẽ về hình thức.", "D. Tính xã hội hóa toàn diện."], answer: "A" },

function shuffle(array) {
  for (let i = array.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [array[i], array[j]] = [array[j], array[i]];
  }
  return array;
}

function updateScore() {
  document.getElementById('c-count').innerText = corrects;
  document.getElementById('w-count').innerText = wrongs;
}

function renderQuiz() {
  const area = document.getElementById('main-area');
  area.innerHTML = '';

  // Phần I: Trắc nghiệm 4 lựa chọn
  let section = document.createElement('div');
  section.innerHTML = '<div class="part-label">Phần I: Trắc nghiệm lựa chọn (4 phương án)</div>';
  area.appendChild(section);

  shuffle([...quizData.tn]).forEach(q => {
    const card = document.createElement('div');
    card.className = 'q-card';
    card.innerHTML = `<div class="q-text">${q.question}</div>`;
    const grid = document.createElement('div');
    grid.className = 'options-grid';
    q.options.forEach(opt => {
      const btn = document.createElement('button');
      btn.className = 'opt-item';
      btn.innerText = opt;
      btn.onclick = () => {
        if (grid.classList.contains('disabled')) return;
        grid.classList.add('disabled');
        if (opt.startsWith(q.answer)) {
          btn.classList.add('correct');
          corrects++;
        } else {
          btn.classList.add('wrong');
          wrongs++;
          Array.from(grid.children).forEach(b => {
            if (b.innerText.startsWith(q.answer)) b.classList.add('correct');
          });
        }
        updateScore();
      };
      grid.appendChild(btn);
    });
    card.appendChild(grid);
    area.appendChild(card);
  });

  // Phần II: Phát biểu sai
  section = document.createElement('div');
  section.innerHTML = '<div class="part-label">Phần II: Tìm phát biểu SAI</div>';
  area.appendChild(section);

      btn.className = 'opt-item';
      btn.innerText = opt;
      btn.onclick = () => {
        if (grid.classList.contains('disabled')) return;
        grid.classList.add('disabled');
        if (opt.startsWith(q.answer)) {
          btn.classList.add('correct');
          corrects++;
        } else {
          btn.classList.add('wrong');
          wrongs++;
          Array.from(grid.children).forEach(b => {
            if (b.innerText.startsWith(q.answer)) b.classList.add('correct');
          });
        }
        updateScore();
      };
      grid.appendChild(btn);
    });
    card.appendChild(grid);
    area.appendChild(card);
  });

  // Phần III: Tình huống
  section = document.createElement('div');
  section.innerHTML = '<div class="part-label">Phần III: Đọc tình huống trả lời câu hỏi</div>';

        btn.innerText = opt;

  section.innerHTML = '<div class="part-label">Phần IV: Trắc nghiệm Đúng / Sai (bao gồm Ôn tập lớp 10)</div>';
  area.appendChild(section);

  quizData.dungSai.forEach(group => {
    const card = document.createElement('div');
    card.className = 'q-card';
    card.innerHTML = `<div class="doc-content">${group.content || group.title}</div>`;
    const table = document.createElement('table');
    table.className = 'ds-table';
    group.items.forEach(item => {
      const tr = document.createElement('tr');
      tr.className = 'ds-row';
      tr.innerHTML = `<td class="ds-cell-text">${item.statement}</td><td class="ds-cell-btns"></td>`;
      const btnCell = tr.querySelector('.ds-cell-btns');
      ['Đúng', 'Sai'].forEach(label => {
        const btn = document.createElement('button');
        btn.className = 'btn-ds';
        btn.innerText = label;
        btn.onclick = () => {
          if (btnCell.classList.contains('disabled')) return;
          btnCell.classList.add('disabled');
          const isCorrect = (label === 'Đúng' && item.correct) || (label === 'Sai' && !item.correct);
          if (isCorrect) {
            btn.classList.add('correct');
            corrects++;
          } else {
            btn.classList.add('wrong');
            wrongs++;
          }
          updateScore();
        };
        btnCell.appendChild(btn);
      });
      table.appendChild(tr);
    });
    card.appendChild(table);
    area.appendChild(card);
  });
}

function resetApp() {
  if (confirm("Xáo trộn câu hỏi và làm lại toàn bộ?")) {
    corrects = 0;
    wrongs = 0;
    updateScore();
    renderQuiz();
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }
}

// Khởi chạy
renderQuiz();
</script>
</body>
</html>
