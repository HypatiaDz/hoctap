    { b: "Bài 27", q: "Tại sao tỉ trọng trang trại chăn nuôi ở VN tăng nhanh?", a: "Hiệu quả kinh tế cao, hướng tới hàng hóa.", opts: ["Do khí hậu quá nóng.", "Hiệu quả kinh tế cao, hướng tới hàng hóa.", "Do diện tích lúa giảm.", "Thiếu phân bón."] },
    { b: "Bài 27 (Đ/S)", q: "Vùng nông nghiệp là đơn vị sản xuất cơ sở. Đúng hay Sai?", a: "Sai", opts: ["Đúng", "Sai"] },
    { b: "Bài 27 (Đ/S)", q: "Phát triển nông nghiệp bền vững giúp giảm tác động tiêu cực đến môi trường. Đúng hay Sai?", a: "Đúng", opts: ["Đúng", "Sai"] },
    { b: "Bài 27 (Đ/S)", q: "Trang trại không sử dụng lao động làm thuê. Đúng hay Sai?", a: "Sai", opts: ["Đúng", "Sai"] },
    { b: "Bài 27 (Đ/S)", q: "Khu nông nghiệp công nghệ cao phụ thuộc hoàn toàn vào thiên nhiên. Đúng hay Sai?", a: "Sai", opts: ["Đúng", "Sai"] }
];

let correct = 0, wrong = 0, done = 0;

function shuffle(array) { return array.sort(() => Math.random() - 0.5); }

function init() {
    const area = document.getElementById('quiz-area');
    const shuffled = shuffle([...data]);
    document.getElementById('total-q').innerText = shuffled.length;

    shuffled.forEach((item, idx) => {
        const card = document.createElement('div');
        const bClass = item.b.includes("25") ? "b25" : (item.b.includes("26") ? "b26" : "b27");
        card.className = `q-card ${bClass}`;
        
        const sOpts = shuffle([...item.opts]);
        
        card.innerHTML = `
            <span class="tag" style="background:${item.b.includes('25')?'var(--p25)':item.b.includes('26')?'var(--p26)':'var(--p27)'}">${item.b}</span>
            <div class="q-text">Câu ${idx+1}: ${item.q}</div>
            <div class="opts">${sOpts.map(o => `<div class="opt" onclick="check(this, '${o}', '${item.a}')">${o}</div>`).join('')}</div>
        `;
        area.appendChild(card);
    });
}

function check(el, choice, ans) {
    const parent = el.parentElement;
    if(parent.classList.contains('disabled')) return;
    done++;
    document.getElementById('done').innerText = done;
    if(choice === ans) { el.classList.add('correct'); correct++; document.getElementById('c-score').innerText = correct; }
    else { 
        el.classList.add('wrong'); wrong++; document.getElementById('w-score').innerText = wrong;
        Array.from(parent.children).forEach(o => { if(o.innerText === ans) o.classList.add('correct'); });
    }
    parent.classList.add('disabled');
}

init();
</script>
