let corrects = 0;
let wrongs = 0;

function updateScore() {
    document.getElementById('c-count').innerText = corrects;
    document.getElementById('w-count').innerText = wrongs;
}

function renderTN(areaId, data) {
    const area = document.getElementById(areaId);
    data.forEach(item => {
        const card = document.createElement('div');
        card.className = 'q-card';
        card.innerHTML = `<div class="q-text">${item.q}</div>`;
        const optsDiv = document.createElement('div');
        optsDiv.className = 'options-grid';
        item.opts.forEach(o => {
            const btn = document.createElement('button');
            btn.className = 'opt-item';
            btn.innerText = o;
            btn.onclick = () => {
                if (optsDiv.classList.contains('disabled')) return;
                const code = o.charAt(0);
                if (code === item.a) { btn.classList.add('correct'); corrects++; }
                else { 
                    btn.classList.add('wrong'); wrongs++;
                    Array.from(optsDiv.children).forEach(b => { if(b.innerText.charAt(0) === item.a) b.classList.add('correct'); });
                }
                optsDiv.classList.add('disabled');
                updateScore();
            };
            optsDiv.appendChild(btn);
        });
        card.appendChild(optsDiv);
        area.appendChild(card);
    });
}

function renderDS(areaId, data) {
    const area = document.getElementById(areaId);
    data.forEach(group => {
        const card = document.createElement('div');
        card.className = 'q-card';
        card.innerHTML = `
            <div class="q-text" style="color:#e67e22">II. PHẦN TRẮC NGHIỆM ĐÚNG/SAI</div>
            <div class="doc-content">${group.doc}</div>
            <table class="ds-table"></table>
        `;
        const table = card.querySelector('.ds-table');
        group.items.forEach(item => {
            const row = document.createElement('tr');
            row.className = 'ds-row';
            row.innerHTML = `<td class="ds-cell-text">${item.s}</td><td class="ds-cell-btns"></td>`;
            const btnCell = row.querySelector('.ds-cell-btns');
            ['Đúng', 'Sai'].forEach(label => {
                const b = document.createElement('button');
                b.className = 'btn-ds';
                b.innerText = label;
                b.onclick = () => {
                    if (btnCell.classList.contains('disabled')) return;
                    const choice = (label === 'Đúng');
                    if (choice === item.a) { b.classList.add('correct'); corrects++; }
                    else { b.classList.add('wrong'); wrongs++; }
                    btnCell.classList.add('disabled');
                    updateScore();
                };
                btnCell.appendChild(b);
            });
            table.appendChild(row);
        });
        area.appendChild(card);
    });
}
