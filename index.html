<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Full Đề Cương Địa Lí 10</title>
    <style>
        :root { --p: #2e7d32; --s: #388e3c; --d: #d32f2f; --bg: #f4f7f6; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; padding: 15px; }
        .container { max-width: 850px; margin: auto; background: white; padding: 25px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .score-box { position: sticky; top: 10px; background: white; border: 2px solid var(--p); padding: 12px; border-radius: 10px; display: flex; justify-content: space-around; font-weight: bold; margin-bottom: 20px; z-index: 100; }
        .q-card { border: 1px solid #ddd; padding: 18px; border-radius: 10px; margin-bottom: 20px; border-left: 5px solid var(--p); }
        .q-text { font-size: 1.1rem; font-weight: bold; margin-bottom: 15px; color: #333; }
        .opts { display: grid; gap: 8px; }
        .opt { padding: 12px; border: 1px solid #eee; border-radius: 8px; cursor: pointer; transition: 0.2s; background: #fafafa; }
        .opt:hover { background: #f0f0f0; }
        .opt.correct { background: #c8e6c9 !important; border-color: var(--s) !important; color: #1b5e20; font-weight: bold; }
        .opt.wrong { background: #ffcdd2 !important; border-color: var(--d) !important; color: #b71c1c; }
        .tag { font-size: 0.75rem; padding: 2px 8px; border-radius: 5px; color: white; margin-bottom: 8px; display: inline-block; font-weight: bold; }
        .btn-refresh { width: 100%; padding: 15px; background: var(--p); color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 1rem; margin-bottom: 20px; }
        .disabled { pointer-events: none; }
    </style>
</head>
<body>

<div class="score-box">
    <div style="color: var(--s)">Đúng: <span id="c-score">0</span></div>
    <div style="color: var(--d)">Sai: <span id="w-score">0</span></div>
    <div style="color: #555">Câu: <span id="progress">0</span> / <span id="total-q">0</span></div>
</div>

<div class="container">
    <h2 style="text-align:center; color: var(--p)">ÔN TẬP TOÀN BỘ ĐỀ CƯƠNG ĐỊA LÍ 10</h2>
    <button class="btn-refresh" onclick="location.reload()">🔄 LÀM MỚI & TRỘN TOÀN BỘ CÂU HỎI</button>
    <div id="quiz-area"></div>
</div>

<script>
const fullData = [
    // BÀI 25
    { b: "Bài 25", q: "Ngành nông nghiệp có vai trò nào?", a: "cung cấp lương thực, thực phẩm cho con người.", opts: ["cung cấp lương thực, thực phẩm cho con người.", "cung cấp thiết bị máy móc.", "cung cấp tư liệu sản xuất cho mọi ngành.", "vận chuyển hàng hóa."] },
    { b: "Bài 25", q: "Đặc điểm KHÔNG ĐÚNG với sản xuất nông nghiệp?", a: "Sản xuất bao gồm giai đoạn khai thác tài nguyên và chế biến.", opts: ["Đất trồng là tư liệu sản xuất không thể thay thế.", "Đối tượng sản xuất là cây trồng, vật nuôi.", "Sản xuất bao gồm giai đoạn khai thác tài nguyên và chế biến.", "Sản xuất phụ thuộc vào tự nhiên."] },
    { b: "Bài 25", q: "Ý nào không phải đặc điểm của nông - lâm - thuỷ sản?", a: "Sản xuất nông nghiệp thường không có tính mùa vụ.", opts: ["Đất trồng là tư liệu chủ yếu.", "Đối tượng là cây trồng, vật nuôi.", "Sản xuất nông nghiệp thường không có tính mùa vụ.", "Chịu tác động của điều kiện tự nhiên."] },
    { b: "Bài 25", q: "Tư liệu sản xuất chủ yếu của nông nghiệp và lâm nghiệp là?", a: "Đất trồng.", opts: ["Khí hậu.", "Nguồn nước.", "Đất trồng.", "Giống."] },
    { b: "Bài 25", q: "Tư liệu sản xuất của ngành thuỷ sản là?", a: "diện tích mặt nước.", opts: ["tài nguyên sinh vật.", "diện tích mặt nước.", "địa hình.", "thủy triều."] },
    { b: "Bài 25", q: "Nhân tố ảnh hưởng làm sản xuất nông nghiệp có tính bấp bênh?", a: "khí hậu.", opts: ["đất đai.", "nguồn nước.", "khí hậu.", "sinh vật."] },
    { b: "Bài 25", q: "Sản xuất nông nghiệp ngày càng giảm phụ thuộc vào tự nhiên nhờ?", a: "sự phát triển của khoa học – công nghệ.", opts: ["tỉ trọng ngành giảm.", "sự phát triển của khoa học – công nghệ.", "khí hậu biến đổi.", "mở rộng diện tích."] },
    { b: "Bài 25", q: "Nông nghiệp thâm canh là mô hình tối ưu cho quốc gia nào?", a: "Quỹ đất hạn chế nhưng giàu vốn và công nghệ.", opts: ["Quỹ đất rộng lớn.", "Nghèo vốn.", "Quỹ đất hạn chế nhưng giàu vốn và công nghệ.", "Vùng sâu vùng xa."] },

    // BÀI 26
    { b: "Bài 26", q: "Cây trồng phân bố chủ yếu ở nhiệt đới, châu Á gió mùa?", a: "Lúa gạo.", opts: ["Lúa gạo.", "Củ cải đường.", "Chè.", "Lúa mì."] },
    { b: "Bài 26", q: "Cây cà phê thích hợp nhất với loại đất nào?", a: "Đất badan.", opts: ["Đất phù sa.", "Đất badan.", "Đất đen.", "Đất xám."] },
    { b: "Bài 26", q: "Cây nào thuộc nhóm cây cho chất kích thích?", a: "Cà phê.", opts: ["Bông.", "Cao su.", "Cà phê.", "Mía."] },
    { b: "Bài 26", q: "Vai trò của ngành chăn nuôi là gì?", a: "Cung cấp nguyên liệu cho sản xuất công nghiệp.", opts: ["Hạn chế sử dụng tài nguyên.", "Cung cấp nguyên liệu cho sản xuất công nghiệp.", "Vai trò thứ yếu.", "Chỉ phục vụ tại chỗ."] },
    { b: "Bài 26", q: "Vật nuôi chăn thả ở vùng khí hậu khô, cận nhiệt và ôn đới?", a: "Cừu.", opts: ["Bò.", "Lợn.", "Cừu.", "Gà."] },
    { b: "Bài 26", q: "Đặc điểm đúng với ngành lâm nghiệp?", a: "Quá trình sinh trưởng tự nhiên của rừng đóng vai trò quan trọng.", opts: ["Chỉ bao gồm khai thác.", "Quá trình sinh trưởng tự nhiên của rừng đóng vai trò quan trọng.", "Khai thác khó khăn do công nghệ.", "Sản xuất quy mô hẹp."] },
    { b: "Bài 26", q: "Vì sao nuôi trồng thủy sản thế giới ngày càng phát triển?", a: "Nhu cầu thị trường tăng cao.", opts: ["Diện tích nước lớn.", "Nhu cầu thị trường tăng cao.", "Lương thực dư thừa.", "Giá thành rẻ."] },

    // BÀI 27
    { b: "Bài 27", q: "Ý nào KHÔNG ĐÚNG về TCLTNN?", a: "Phát triển mang tính tự phát.", opts: ["Hệ thống liên kết không gian.", "Chuyên môn hóa.", "Phát triển mang tính tự phát.", "Sản xuất liên ngành."] },
    { b: "Bài 27", q: "Mục đích sử dụng hiệu quả nhất của TCLTNN là?", a: "tiềm năng tự nhiên, kinh tế - xã hội.", opts: ["nguồn vốn đầu tư.", "tiềm năng tự nhiên, kinh tế - xã hội.", "máy móc hiện đại.", "giống biến đổi gen."] },
    { b: "Bài 27", q: "Mục đích cuối cùng của TCLTNN là?", a: "nâng cao hiệu quả kinh tế - xã hội và môi trường.", opts: ["mở rộng diện tích tối đa.", "hạn chế máy móc.", "nâng cao hiệu quả kinh tế - xã hội và môi trường.", "tập trung vào một vùng."] },
    { b: "Bài 27", q: "Đối tượng chính của TCLTNN là?", a: "cây trồng, vật nuôi.", opts: ["nhà máy.", "giao thông.", "cây trồng, vật nuôi.", "đô thị."] },
    { b: "Bài 27", q: "Khác biệt cơ bản giữa trang trại và hộ gia đình là?", a: "quy mô lớn hơn và hướng tới sản xuất hàng hóa.", opts: ["quy mô nhỏ hơn.", "phục vụ gia đình là chính.", "quy mô lớn hơn và hướng tới sản xuất hàng hóa.", "không dùng lao động thuê."] },
    { b: "Bài 27", q: "Hình thức TCLTNN cao nhất là?", a: "Vùng nông nghiệp.", opts: ["Trang trại.", "Vùng nông nghiệp.", "Khu công nghệ cao.", "Hộ gia đình."] },
    { b: "Bài 27", q: "Đặc điểm khu nông nghiệp ứng dụng công nghệ cao?", a: "ứng dụng mạnh mẽ KH-KT tạo năng suất chất lượng vượt trội.", opts: ["dùng lao động thủ công.", "quy mô nhỏ.", "ứng dụng mạnh mẽ KH-KT tạo năng suất chất lượng vượt trội.", "phụ thuộc thời tiết."] },

    // CÁC Ý NHỎ TỪ PHẦN ĐÚNG/SAI & BIỂU ĐỒ (Tách riêng)
    { b: "Đúng/Sai", q: "Mía là cây trồng quan trọng ở miền khí hậu cận nhiệt đới. Đúng hay Sai?", a: "Sai", opts: ["Đúng", "Sai"] },
    { b: "Đúng/Sai", q: "Lâm nghiệp có chức năng nghiên cứu khoa học. Đúng hay Sai?", a: "Đúng", opts: ["Đúng", "Sai"] },
    { b: "Đúng/Sai", q: "Thủy sản đáp ứng chủ yếu nguyên liệu công nghiệp hàng tiêu dùng. Đúng hay Sai?", a: "Sai", opts: ["Đúng", "Sai"] },
    { b: "Đúng/Sai", q: "Diện tích nước, chất lượng nước là tư liệu sản xuất của thủy sản. Đúng hay Sai?", a: "Đúng", opts: ["Đúng", "Sai"] },
    { b: "Đúng/Sai", q: "Trong giai đoạn 2019 - 2022, sản lượng thủy sản nuôi trồng giảm. Đúng hay Sai?", a: "Sai", opts: ["Đúng", "Sai"] },
    { b: "Đúng/Sai", q: "Năm 2022, sản lượng thủy sản nuôi trồng cao hơn đánh bắt. Đúng hay Sai?", a: "Đúng", opts: ["Đúng", "Sai"] },
    { b: "Đúng/Sai", q: "TCLTNN góp phần chuyển từ nông nghiệp cổ truyền sang hàng hóa. Đúng hay Sai?", a: "Đúng", opts: ["Đúng", "Sai"] },
    { b: "Biểu đồ", q: "Tỉ trọng trang trại chăn nuôi ở VN cao nhất là do?", a: "chuyển sang nông nghiệp hàng hóa, hiệu quả kinh tế cao.", opts: ["diện tích đất tăng.", "chuyển sang nông nghiệp hàng hóa, hiệu quả kinh tế cao.", "khí hậu thay đổi.", "thiếu thức ăn trồng trọt."] },
    { b: "Biểu đồ", q: "Tỉ trọng trang trại trồng trọt giảm chủ yếu do?", a: "Khó khăn đất đai, hạ tầng và biến đổi khí hậu.", opts: ["Không có thị trường.", "Khó khăn đất đai, hạ tầng và biến đổi khí hậu.", "Người dân bỏ nghề.", "Thiếu giống."] }
];

let cScore = 0, wScore = 0, done = 0;
function shuffle(arr) { return arr.sort(() => Math.random() - 0.5); }

function start() {
    const area = document.getElementById('quiz-area');
    const shuffled = shuffle([...fullData]);
    document.getElementById('total-q').innerText = shuffled.length;
    
    shuffled.forEach((item, idx) => {
        const card = document.createElement('div');
        card.className = 'q-card';
        const sOpts = shuffle([...item.opts]);
        
        card.innerHTML = `
            <span class="tag" style="background:${item.b=='Bài 25'?'#1976d2':item.b=='Bài 26'?'#388e3c':item.b=='Bài 27'?'#f57c00':'#607d8b'}">${item.b}</span>
            <div class="q-text">Câu ${idx+1}: ${item.q}</div>
            <div class="opts">${sOpts.map(o => `<div class="opt" onclick="check(this, '${o}', '${item.a}')">${o}</div>`).join('')}</div>
        `;
        area.appendChild(card);
    });
}

function check(el, choice, correct) {
    const parent = el.parentElement;
    if(parent.classList.contains('disabled')) return;
    done++;
    document.getElementById('progress').innerText = done;
    if(choice === correct) { el.classList.add('correct'); cScore++; document.getElementById('c-score').innerText = cScore; }
    else { 
        el.classList.add('wrong'); wScore++; document.getElementById('w-score').innerText = wScore;
        Array.from(parent.children).forEach(c => { if(c.innerText === correct) c.classList.add('correct'); });
    }
    parent.classList.add('disabled');
}

start();
</script>
</body>
</html>
