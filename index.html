function renderHistory() {
    const container = document.getElementById('su-content');
    let html = `<h2 class="part-label">Trắc nghiệm Lịch sử 10 (${quizData.tn.length} câu)</h2>`;
   
    quizData.tn.forEach(q => {
        html += `
        <div class="q-card" id="q-${q.id}">
            <div class="q-text">${q.question}</div>
            <div class="options-grid">
                ${q.options.map((opt, i) => `
                    <div class="opt-item" data-id="${q.id}" data-answer="${String.fromCharCode(65 + i)}">
                        ${opt}
                    </div>
                `).join('')}
            </div>
        </div>`;
    });
   
    container.innerHTML = html;

    document.querySelectorAll('.opt-item').forEach(item => {
        item.addEventListener('click', function() {
            const qId = parseInt(this.dataset.id);
            const selected = this.dataset.answer;
            const question = quizData.tn.find(q => q.id === qId);
            const card = document.getElementById(`q-${qId}`);

            if (selected === question.answer) {
                this.classList.add('correct');
                corrects++;
            } else {
                this.classList.add('wrong');
                wrongs++;
            }

            document.getElementById('c-count').textContent = corrects;
            document.getElementById('w-count').textContent = wrongs;

            card.querySelectorAll('.opt-item').forEach(opt => opt.style.pointerEvents = 'none');
        });
    });
}

document.addEventListener('DOMContentLoaded', renderHistory);

function resetApp() {
    corrects = 0;
    wrongs = 0;
    document.getElementById('c-count').textContent = 0;
    document.getElementById('w-count').textContent = 0;
    renderHistory();
}
</script>
