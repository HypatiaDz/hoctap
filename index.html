let corrects = 0;
let wrongs = 0;

function updateScore() {
    document.getElementById('correct-count').innerText = corrects;
    document.getElementById('wrong-count').innerText = wrongs;
}

function renderTN(areaId, dataList) {
    const area = document.getElementById(areaId);
    dataList.forEach(item => {
        const card = document.createElement('div');
        card.className = 'q-card';
        card.innerHTML = `<div class="q-text">${item.q}</div>`;
        const optsDiv = document.createElement('div');
        optsDiv.className = 'options';
        item.opts.forEach(o => {
            const btn = document.createElement('button');
            btn.className = 'opt-btn';
            btn.innerText = o;
            btn.onclick = () => {
                if (optsDiv.classList.contains('disabled')) return;
                if (o === item.a) { btn.classList.add('correct'); corrects++; }
                else { 
                    btn.classList.add('wrong'); wrongs++;
                    Array.from(optsDiv.children).forEach(b => { if(b.innerText === item.a) b.classList.add('correct'); });
                }
                optsDiv.classList.add('disabled');
                updateScore();
            };
            optsDiv.appendChild(btn);
        });
        card.appendChild(optsDiv);
        area.appendChild(card);
    });
}

function renderDS(areaId, dataList) {
    const area = document.getElementById(areaId);
    dataList.forEach(group => {
        const card = document.createElement('div');
        card.className = 'q-card';
        card.innerHTML = `<div class="q-text" style="color:#d32f2f">ĐOẠN TƯ LIỆU / NHẬN ĐỊNH:</div><p><i>${group.t}</i></p>`;
        
        group.items.forEach(item => {
            const row = document.createElement('div');
            row.className = 'ds-row';
            row.innerHTML = `<div class="ds-text">${item.s}</div>`;
            const btns = document.createElement('div');
            btns.className = 'ds-btns';
            
            ['Đúng', 'Sai'].forEach(val => {
                const b = document.createElement('button');
                b.className = 'btn-ds';
                b.innerText = val;
                b.onclick = () => {
                    if (btns.classList.contains('disabled')) return;
                    const isTrueChoice = (val === 'Đúng');
                    if (isTrueChoice === item.a) { b.classList.add('correct'); corrects++; }
                    else { b.classList.add('wrong'); wrongs++; }
                    btns.classList.add('disabled');
                    updateScore();
                };
                btns.appendChild(b);
            });
            row.appendChild(btns);
            card.appendChild(row);
        });
        area.appendChild(card);
    });
}
