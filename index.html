        .opt:hover { background: #f8f9fa; }

        .opt.wrong { background: #f8d7da !important; border-color: var(--danger) !important; color: #721c24; }
        .opt.disabled { pointer-events: none; }
        .reset-btn { width: 100%; padding: 15px; background: var(--primary); color: white; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; margin-bottom: 20px; }
    </style>
</head>

let currentSubject = 'su';
let correctCount = 0; 
let wrongCount = 0;

function switchTab(subject) {
    currentSubject = subject;
    document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
    event.target.classList.add('active');
    initQuiz();
}

function shuffle(array) { return array.sort(() => Math.random() - 0.5); }

function initQuiz() {
    const box = document.getElementById('quiz-box');
    box.innerHTML = ''; 
    correctCount = 0; wrongCount = 0;
    document.getElementById('correct-count').innerText = 0;
    document.getElementById('wrong-count').innerText = 0;
    
    const questions = currentSubject === 'su' ? dataHistory : dataGeo;
    const shuffledQ = shuffle([...questions]);
    
    shuffledQ.forEach((item, index) => {
        const card = document.createElement('div');
        card.className = 'question-card';
        const opts = shuffle([...item.opts]);
        card.innerHTML = `
            <span class="tag">${item.t}</span>
            <div class="q-text">Câu ${index + 1}: ${item.q}</div>
            <div class="options">
                ${opts.map(o => `<div class="opt" onclick="check(this, '${o.replace(/'/g, "\\'")}', '${item.a.replace(/'/g, "\\")}')">${o}</div>`).join('')}
            </div>
        `;
        box.appendChild(card);
    });
}

function check(el, selected, correct) {
    const parent = el.parentElement;
    const options = parent.querySelectorAll('.opt');
    if (selected === correct) {
        el.classList.add('correct'); correctCount++;
    } else {
        el.classList.add('wrong'); wrongCount++;
        options.forEach(opt => { if (opt.innerText === correct) opt.classList.add('correct'); });
    }
    options.forEach(opt => opt.classList.add('disabled'));
    document.getElementById('correct-count').innerText = correctCount;
    document.getElementById('wrong-count').innerText = wrongCount;
}

initQuiz();
</script>
