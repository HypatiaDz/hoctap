let corrects = 0, wrongs = 0;

function shuffle(arr) {
    for (let i = arr.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
    }
    return arr;
}

function updateScore() {
    document.getElementById('c-count').innerText = corrects;
    document.getElementById('w-count').innerText = wrongs;
}

function renderSection(id) {
    const area = document.getElementById(`area-${id}`);
    area.innerHTML = "";
    const sData = data[id];

    const labelI = document.createElement('div');
    labelI.className = 'part-label';
    labelI.innerText = "I. Trắc nghiệm lựa chọn";
    area.appendChild(labelI);

    shuffle([...sData.tn]).forEach(item => {
        const card = document.createElement('div');
        card.className = 'q-card';
        card.innerHTML = `<div class="q-text">${item.q}</div>`;
        const optsDiv = document.createElement('div');
        optsDiv.className = 'options-grid';
        item.opts.forEach(o => {
            const btn = document.createElement('button');
            btn.className = 'opt-item'; btn.innerText = o;
            btn.onclick = () => {
                if (optsDiv.classList.contains('disabled')) return;
                if (o.charAt(0) === item.a) { btn.classList.add('correct'); corrects++; }
                else { 
                    btn.classList.add('wrong'); wrongs++;
                    Array.from(optsDiv.children).forEach(b => { if(b.innerText.charAt(0) === item.a) b.classList.add('correct'); });
                }
                optsDiv.classList.add('disabled'); updateScore();
            };
            optsDiv.appendChild(btn);
        });
        card.appendChild(optsDiv); area.appendChild(card);
    });

    const labelII = document.createElement('div');
    labelII.className = 'part-label';
    labelII.innerText = "II. Đúng / Sai";
    area.appendChild(labelII);

    sData.ds.forEach(group => {
        const card = document.createElement('div');
        card.className = 'q-card';
        card.innerHTML = `<div class="doc-content">${group.doc}</div><table class="ds-table"></table>`;
        const table = card.querySelector('.ds-table');
        group.items.forEach(item => {
            const row = document.createElement('tr'); row.className = 'ds-row';
            row.innerHTML = `<td class="ds-cell-text">${item.s}</td><td class="ds-cell-btns"></td>`;
            const btnCell = row.querySelector('.ds-cell-btns');
            ['Đúng', 'Sai'].forEach(lb => {
                const b = document.createElement('button');
                b.className = 'btn-ds'; b.innerText = lb;
                b.onclick = () => {
                    if (btnCell.classList.contains('disabled')) return;
                    if ((lb === 'Đúng') === item.a) { b.classList.add('correct'); corrects++; }
                    else { b.classList.add('wrong'); wrongs++; }
                    btnCell.classList.add('disabled'); updateScore();
                };
                btnCell.appendChild(b);
            });
            table.appendChild(row);
        });
        area.appendChild(card);
    });
}

function resetAll() {
    if(confirm("Xáo trộn và làm lại từ đầu?")) {
        corrects = 0; wrongs = 0; updateScore();
        renderSection('25'); renderSection('26'); renderSection('27');
        window.scrollTo(0,0);
    }
}

renderSection('25'); renderSection('26'); renderSection('27');
</script>
