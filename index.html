<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">

    <style>
        :root { --primary: #1565c0; --bg: #f8f9fa; --accent: #e67e22; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: var(--bg); padding: 20px; line-height: 1.6; }
        .container { max-width: 1000px; margin: auto; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); }
        .section-title { color: white; padding: 15px; border-radius: 8px; margin: 20px 0; font-weight: bold; font-size: 1.2rem; display: flex; justify-content: space-between; align-items: center; background: var(--primary); }
        .q-card { border: 1px solid #ddd; padding: 20px; border-radius: 10px; margin-bottom: 25px; background: #fff; }
        .q-text { font-weight: bold; margin-bottom: 15px; font-size: 1.1rem; color: #333; }
        .doc-content { background: #fff8e1; border-left: 5px solid #ff8f00; padding: 15px; margin-bottom: 20px; font-style: italic; color: #5d4037; white-space: pre-wrap; }
        .options-grid { display: grid; gap: 10px; margin-bottom: 10px; }
        .opt-item { padding: 12px 15px; border: 1px solid #dee2e6; border-radius: 8px; cursor: pointer; background: #fff; text-align: left; transition: 0.2s; font-size: 1rem; width: 100%; }
        .opt-item:hover { background: #f1f3f5; }
        .ds-table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        .ds-row { border-bottom: 1px solid #eee; }
        .ds-cell-text { padding: 12px 0; font-size: 1rem; }
        .ds-cell-btns { text-align: right; white-space: nowrap; padding-left: 15px; }
        .btn-ds { padding: 8px 18px; border: 1.5px solid #adb5bd; border-radius: 5px; cursor: pointer; font-weight: bold; background: white; margin-left: 5px; }
        .correct { background: #d4edda !important; border-color: #28a745 !important; color: #155724; }
        .wrong { background: #f8d7da !important; border-color: #dc3545 !important; color: #721c24; }
        .disabled { pointer-events: none; opacity: 0.8; }
        .score-bar { position: sticky; top: 10px; background: #343a40; color: white; padding: 15px; border-radius: 10px; display: flex; justify-content: space-around; z-index: 1000; margin-bottom: 20px; align-items: center; }
        .btn-reset-all { background: #dc3545; color: white; border: none; padding: 8px 15px; border-radius: 5px; cursor: pointer; font-weight: bold; }
        .part-label { color: var(--accent); font-weight: bold; margin: 30px 0 15px; text-transform: uppercase; border-bottom: 2px solid var(--accent); display: inline-block; }
    </style>
</head>

let corrects = 0, wrongs = 0;

function shuffle(array) {
    for (let i = array.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [array[i], array[j]] = [array[j], array[i]];
    }
    return array;
}

function updateScore() {
    document.getElementById('c-count').innerText = corrects;
    document.getElementById('w-count').innerText = wrongs;
}

function renderQuiz() {
    const area = document.getElementById('main-area');
    area.innerHTML = "";

    // Render Trắc nghiệm 4 phương án
    const label1 = document.createElement('div');
    label1.className = 'part-label'; label1.innerText = "Phần I: Trắc nghiệm lựa chọn";
    area.appendChild(label1);

    shuffle([...quizData.tn]).forEach(item => {
        const card = document.createElement('div');
        card.className = 'q-card';
        card.innerHTML = `<div class="q-text">${item.q}</div>`;
        const optsDiv = document.createElement('div');
        optsDiv.className = 'options-grid';
        item.opts.forEach(o => {
            const btn = document.createElement('button');
            btn.className = 'opt-item'; btn.innerText = o;
            btn.onclick = () => {
                if (optsDiv.classList.contains('disabled')) return;
                if (o.trim().startsWith(item.a)) { btn.classList.add('correct'); corrects++; }
                else { 
                    btn.classList.add('wrong'); wrongs++;
                    Array.from(optsDiv.children).forEach(b => {
                        if(b.innerText.trim().startsWith(item.a)) b.classList.add('correct');
                    });
                }
                optsDiv.classList.add('disabled'); updateScore();
            };
            optsDiv.appendChild(btn);
        });
        card.appendChild(optsDiv); area.appendChild(card);
    });

    // Render Đúng/Sai
    const label2 = document.createElement('div');
    label2.className = 'part-label'; label2.innerText = "Phần II: Đúng / Sai";
    area.appendChild(label2);

    quizData.ds.forEach(group => {
        const card = document.createElement('div');
        card.className = 'q-card';
        card.innerHTML = `<div class="doc-content">${group.doc}</div><table class="ds-table"></table>`;
        const table = card.querySelector('.ds-table');
        group.items.forEach(item => {
            const row = document.createElement('tr'); row.className = 'ds-row';
            row.innerHTML = `<td class="ds-cell-text">${item.s}</td><td class="ds-cell-btns"></td>`;
            const btnCell = row.querySelector('.ds-cell-btns');
            ['Đúng', 'Sai'].forEach(lb => {
                const b = document.createElement('button');
                b.className = 'btn-ds'; b.innerText = lb;
                b.onclick = () => {
                    if (btnCell.classList.contains('disabled')) return;
                    const isCorrect = (lb === 'Đúng' && item.a === true) || (lb === 'Sai' && item.a === false);
                    if (isCorrect) { b.classList.add('correct'); corrects++; }
                    else { b.classList.add('wrong'); wrongs++; }
                    btnCell.classList.add('disabled'); updateScore();
                };
                btnCell.appendChild(b);
            });
            table.appendChild(row);
        });
        area.appendChild(card);
    });
}

function resetApp() {
    if(confirm("Xáo trộn và làm lại toàn bộ?")) {
        corrects = 0; wrongs = 0; updateScore();
        renderQuiz();
        window.scrollTo(0,0);
    }
}

renderQuiz();
</script>
</body>
</html>
